<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Article to Markdown</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <div class="header">
      <span class="dot"></span>
      <h1>Clipped</h1>
    </div>
    <p class="sub">Extract to markdown for Claude</p>

    <div id="status" class="status"></div>

    <!-- Primary Action -->
    <button id="copyBtn" class="btn btn-primary btn-large">
      📋 Copy to Clipboard
    </button>

    <!-- Secondary Actions (Collapsed) -->
    <button id="toggleBtn" class="btn-toggle">
      <span id="toggleIcon">▼</span> More options
    </button>

    <div id="secondaryPanel" class="secondary-panel" style="display: none;">
      <!-- Project Selector -->
      <div class="form-group">
        <label>Save to project:</label>
        <div class="project-input-group">
          <input type="text" id="projectInput" placeholder="Name your project..." />
          <button id="addProjectBtn" class="btn-small">+</button>
        </div>
        <div id="projectsList" class="projects-list"></div>
      </div>

      <!-- Secondary Buttons -->
      <div class="secondary-buttons">
        <button id="saveBtn" class="btn btn-secondary">⬇️ Download as .md</button>
        <button id="libraryBtn" class="btn btn-secondary">📚 View Library</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
