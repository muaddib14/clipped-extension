<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clipped Library</title>
  <link rel="stylesheet" href="library.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="header-top">
          <h1>Clipped Library</h1>
          <button class="btn-icon-small" id="clearBtn" title="Delete all clips">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              <line x1="10" y1="11" x2="10" y2="17"></line>
              <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
          </button>
        </div>
        <p class="subtitle">Organize and manage your saved articles</p>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input type="search" id="searchInput" placeholder="Search clips, folders..." />
      </div>
      <div class="view-toggle">
        <button class="tab-btn active" data-view="folders">Folders</button>
        <button class="tab-btn" data-view="all">All Clips</button>
      </div>
    </div>

    <!-- Empty State -->
    <div id="empty" class="empty" style="display: none;">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
      </div>
      <h2 class="empty-title">Your library is empty</h2>
      <p class="empty-subtitle">Clip articles to save them here for later. Use the keyboard shortcut (Alt+Shift+M) or the extension popup.</p>
      <button class="empty-cta" onclick="window.close()">Close & Start Clipping</button>
    </div>

    <!-- Folders View -->
    <div id="foldersView" class="view-container">
      <div class="folders-grid" id="foldersList"></div>
    </div>

    <!-- All Clips View -->
    <div id="allView" class="view-container" style="display: none;">
      <div class="clips-grid" id="clipsList"></div>
    </div>

    <!-- Folder Detail View -->
    <div id="clipsDetail" class="view-container" style="display: none;">
      <div class="folder-header">
        <button class="btn-back" id="backBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"></path>
          </svg>
          Back
        </button>
        <h2 id="folderTitle"></h2>
      </div>
      <div class="clips-grid" id="folderClips"></div>
    </div>
  </div>

  <script src="library.js"></script>
</body>
</html>
